spring.application.name=ms-catalogo
ms.inventario.url=http://localhost:8085



spring.datasource.url=jdbc:mysql://localhost:3306/db_catalogo?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


logging.level.com.smartfood.ms_catalogo=DEBUG
logging.level.org.springframework=WARN
logging.level.org.hibernate.orm.jdbc.bind=DEBUG
logging.level.root=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%5level] %logger{30} - %msg%n

server.port=8082